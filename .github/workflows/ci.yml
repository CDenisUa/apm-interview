name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. new push to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Frontend: lint + type-check + production build (React + TS / Vite).
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (lint • build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check & build
        run: npm run build # `tsc -b && vite build`

  # ---------------------------------------------------------------------------
  # Django backend tests (pytest-django). Needs a Postgres server.
  # The suite creates its own test database (test_portal) and the
  # managed=False tables via the conftest schema editor.
  # ---------------------------------------------------------------------------
  django:
    name: Backend • Django (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/django_app
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: portal
          POSTGRES_PASSWORD: portal
          POSTGRES_DB: portal
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U portal -d portal"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://portal:portal@localhost:5432/portal
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/django_app/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest -q

  # ---------------------------------------------------------------------------
  # FastAPI backend tests (pytest + TestClient). Needs a Postgres server.
  # The suite creates a dedicated throwaway database (fastapi_test).
  # ---------------------------------------------------------------------------
  fastapi:
    name: Backend • FastAPI (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/fastapi_app
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: portal
          POSTGRES_PASSWORD: portal
          POSTGRES_DB: portal
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U portal -d portal"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://portal:portal@localhost:5432/portal
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/fastapi_app/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest -q

  # ---------------------------------------------------------------------------
  # Integration smoke test: build and boot the whole stack via docker compose,
  # then check every service answers. Runs only after the others pass.
  # ---------------------------------------------------------------------------
  docker:
    name: Integration (docker compose)
    runs-on: ubuntu-latest
    needs: [frontend, django, fastapi]
    steps:
      - uses: actions/checkout@v4

      - name: Build and start the stack
        run: docker compose up -d --build

      - name: Wait for services to become healthy
        run: |
          check() {
            for i in $(seq 1 60); do
              code=$(curl -s -o /dev/null -w "%{http_code}" "$1" || true)
              if [ "$code" = "200" ]; then echo "OK   $1"; return 0; fi
              sleep 2
            done
            echo "FAIL $1 (last code: $code)"; return 1
          }
          check http://localhost:8001/api/health
          check http://localhost:8002/api/health
          check http://localhost:5173/

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down
        if: always()
        run: docker compose down -v
